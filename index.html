<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assest tracker</title>
    <link rel="stylesheet" href="output.css" />
  </head>
  <body class="bg-primary flex flex-col items-center">
    <div
      id="container"
      class="flex flex-col items-center gap-5 mt-10 h-screen w-3/5"
    >
      <header class="flex flex-row justify-between items-center w-full">
        <span class="text-lg font-semibold">My Portfolio</span>
        <div class="flex flex-row items-center gap-2 ">
          <span class="h-2 w-2 rounded-3xl bg-bitcoin mb-0 pb-0"></span>
          <p class="text-xs text-gray-600 font-light">
            Live prices : Updated just now
          </p>
        </div>
      </header>
      <!-- this is section 1 it will be injected  -->
      <main id="main" class="w-full flex flex-col">
        <section id="section1" class="flex w-full p-1.5 gap-4">

          <div class="bg-white w-1/4 rounded-2xl p-3.5 flex flex-col gap-4">
            <div class="flex justify-items-start mt-2">
              <p class="text-xs text-aaa uppercase tracking-wider">
                Allocation
              </p>
            </div>
            <div class="flex justify-center">
              <canvas id="myChart" width="130" height="130"></canvas>
            </div>
            <div class="flex flex-col">
              <ul class="flex flex-col gap-1 justify-items-start">
                <li>
                  <div class="flex justify-between items-center w-44">
                    <div class="flex justify-self-start items-center gap-1.5">
                      <p class="bg-bitcoin h-2 w-2 rounded-3xl"></p>
                      <p class="text-xs text-666">bitcoin</p>
                    </div>
                    <div>
                      <p class="text-xs font-medium font-mono">68.2%</p>
                    </div>
                  </div>
                </li>
                <li>
                  <div class="flex justify-between items-center w-44">
                    <div class="flex justify-items-start items-center gap-1.5">
                      <p class="bg-Ethereum h-2 w-2 rounded-3xl"></p>
                      <p class="text-xs text-666">Ethereum</p>
                    </div>
                    <div>
                      <p class="text-xs font-medium font-mono">16.0%</p>
                    </div>
                  </div>
                </li>
                <li>
                  <div class="flex justify-between items-center w-44">
                    <div class="flex justify-items-start items-center gap-1.5">
                      <p class="bg-Euro h-2 w-2 rounded-3xl"></p>
                      <p class="text-xs text-666">Euro</p>
                    </div>
                    <div>
                      <p class="text-xs font-medium font-mono">13.5%</p>
                    </div>
                  </div>
                </li>
                <li>
                  <div class="flex justify-between items-center w-44">
                    <div class="flex justify-items-start items-center gap-1.5">
                      <p class="bg-Solana h-2 w-2 rounded-3xl"></p>
                      <p class="text-xs text-666">Solana</p>
                    </div>
                    <div>
                      <p class="text-xs font-medium font-mono">2.5%</p>
                    </div>
                  </div>
                </li>
              </ul>
            </div>
          </div>
        </section>
        <!-- this is section 2 it will be fixed here  -->
        <section id="sectioin2" class="bg-white rounded-2xl mt-3 pb-6 flex flex-col p-3.5 w-full ">
          <p class="text-[13px] font-semibold mb-3 pt-3.5">add new assest</p>
          <form id="form" class=" flex flex-row w-full justify-center gap-2.5  ">
            <div id="wraper" class="relative">
              <input id="name" class=" text-[13px] h-9.5 rounded-[10px] border border-solid border-border bg-background px-3 w-62.75 focus:bg-white focus:outline-none focus:ring-Euro focus:ring-1" type="text" name="" placeholder="assest name (eg.bitcoin)">
            </div>
            <input id="Ticker" class="text-[13px] h-9.5 rounded-[10px] border border-solid border-border bg-background px-3 w-31.5 focus:bg-white focus:outline-none focus:ring-Euro focus:ring-1" type="text" name="" id="" placeholder="Ticker (eg.btc)">
            <select id="select" class="text-[13px] h-9.5 rounded-[10px] border border-solid border-border bg-background px-3 w-31.5 focus:bg-white focus:outline-none focus:ring-Euro focus:ring-1" name="" id="">
              <option value="Crypto">Crypto</option>
              <option value="Fiat">Fiat</option>
            </select>
            <input type="hidden" id="coinId">
            <input id="Quantity" class="text-[13px] h-9.5 rounded-[10px] border border-solid border-border bg-background px-3 w-31.5 focus:bg-white focus:outline-none focus:ring-Euro focus:ring-1" type="number" name="" id="" placeholder="Quantity">
            <input id="btn" class="h-9.5 text-[13px] text-white px-5 bg-btn rounded-[10px] font-semibold cursor-pointer w-19.5" type="button" value="+ Add">
          </form>
        </section>
        <!-- this is section 3 it will be injected  -->
        <section id="section3" class="w-full  ">
          <table class="w-full  bg-white rounded-2xl mt-4 ">
            <thead class="bg-tablehead border-b border-b-borderb ">
              <tr class="py-2.5 px-4.5 h-[35.2px] ">
                <th class="text-[11px] text-headtext uppercase font-medium tracking-wider w-57.25 text-left pl-4.5 " >Assest</th>
                <th class="text-[11px] text-headtext uppercase font-medium tracking-wider w-28.75 text-left ">Quantity</th>
                <th class="text-[11px] text-headtext uppercase font-medium tracking-wider w-28.75 text-left " >Live Price</th>
                <th class="text-[11px] text-headtext uppercase font-medium tracking-wider w-28.75 text-left  " >Value</th>
                <th class="text-[11px] text-headtext uppercase font-medium tracking-wider w-32.25 text-left " >Allocation</th>
                <th class="w-9 pr-4.5"></th>
              </tr>
            </thead>
            <tbody id="tbody">

            </tbody>
          </table>
        </section>
      </main>
      <footer class="flex justify-center items-center w-full ">
        <p class="text-gray-600 text-[11px] tracking-wider font-semibold my-10  ">assest tracker - 2026 copyright</p>
      </footer>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script defer src="api.js"></script>
    <script defer src="currencyName.js"></script>
    <script defer src="main.js"></script>
  </body>
</html>
